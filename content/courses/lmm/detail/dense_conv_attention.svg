<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="sans-serif">
  <!-- Dense -->
  <g transform="translate(0,0)">
    <text x="110" y="20" text-anchor="middle" font-size="15" font-weight="bold">Dense (FC)</text>
    <text x="110" y="38" text-anchor="middle" font-size="11" fill="#666">모든 입력 → 모든 출력</text>
    <!-- input nodes -->
    <rect x="20" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <rect x="54" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <rect x="88" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <rect x="122" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <rect x="156" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <rect x="190" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <!-- output nodes -->
    <rect x="54" y="200" width="24" height="24" rx="4" fill="#E8744F"/>
    <rect x="110" y="200" width="24" height="24" rx="4" fill="#E8744F"/>
    <rect x="166" y="200" width="24" height="24" rx="4" fill="#E8744F"/>
    <!-- connections (all to all) -->
    <g stroke="#ccc" stroke-width="0.8" fill="none">
      <line x1="32" y1="79" x2="66" y2="200"/>
      <line x1="32" y1="79" x2="122" y2="200"/>
      <line x1="32" y1="79" x2="178" y2="200"/>
      <line x1="66" y1="79" x2="66" y2="200"/>
      <line x1="66" y1="79" x2="122" y2="200"/>
      <line x1="66" y1="79" x2="178" y2="200"/>
      <line x1="100" y1="79" x2="66" y2="200"/>
      <line x1="100" y1="79" x2="122" y2="200"/>
      <line x1="100" y1="79" x2="178" y2="200"/>
      <line x1="134" y1="79" x2="66" y2="200"/>
      <line x1="134" y1="79" x2="122" y2="200"/>
      <line x1="134" y1="79" x2="178" y2="200"/>
      <line x1="168" y1="79" x2="66" y2="200"/>
      <line x1="168" y1="79" x2="122" y2="200"/>
      <line x1="168" y1="79" x2="178" y2="200"/>
      <line x1="202" y1="79" x2="66" y2="200"/>
      <line x1="202" y1="79" x2="122" y2="200"/>
      <line x1="202" y1="79" x2="178" y2="200"/>
    </g>
    <text x="110" y="252" text-anchor="middle" font-size="11" fill="#888">각 픽셀이 독립적으로 작용</text>
    <text x="110" y="268" text-anchor="middle" font-size="11" fill="#888">위치 관계 학습 불가</text>
  </g>

  <!-- Convolution -->
  <g transform="translate(300,0)">
    <text x="110" y="20" text-anchor="middle" font-size="15" font-weight="bold">Convolution</text>
    <text x="110" y="38" text-anchor="middle" font-size="11" fill="#666">주변 입력 → 출력</text>
    <!-- input nodes -->
    <rect x="20" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <rect x="54" y="55" width="24" height="24" rx="4" fill="#F5A623"/>
    <rect x="88" y="55" width="24" height="24" rx="4" fill="#F5A623"/>
    <rect x="122" y="55" width="24" height="24" rx="4" fill="#F5A623"/>
    <rect x="156" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <rect x="190" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <!-- kernel bracket -->
    <rect x="50" y="50" width="100" height="34" rx="6" fill="none" stroke="#F5A623" stroke-width="2" stroke-dasharray="4"/>
    <text x="100" y="104" text-anchor="middle" font-size="10" fill="#F5A623">kernel (3)</text>
    <!-- output nodes -->
    <rect x="54" y="200" width="24" height="24" rx="4" fill="#E8744F"/>
    <rect x="110" y="200" width="24" height="24" rx="4" fill="#ccc"/>
    <rect x="166" y="200" width="24" height="24" rx="4" fill="#ccc"/>
    <!-- connections (only kernel neighbors) -->
    <g stroke="#F5A623" stroke-width="1.5" fill="none">
      <line x1="66" y1="79" x2="66" y2="200"/>
      <line x1="100" y1="79" x2="66" y2="200"/>
      <line x1="134" y1="79" x2="66" y2="200"/>
    </g>
    <text x="110" y="252" text-anchor="middle" font-size="11" fill="#888">주변 패턴만 학습</text>
    <text x="110" y="268" text-anchor="middle" font-size="11" fill="#888">먼 거리 관계는 여러 레이어 필요</text>
  </g>

  <!-- Self-Attention -->
  <g transform="translate(600,0)">
    <text x="150" y="20" text-anchor="middle" font-size="15" font-weight="bold">Self-Attention</text>
    <text x="150" y="38" text-anchor="middle" font-size="11" fill="#666">모든 입력 간 관계 학습</text>
    <!-- input nodes -->
    <rect x="40" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <rect x="80" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <rect x="120" y="55" width="24" height="24" rx="4" fill="#7ED321"/>
    <rect x="160" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <rect x="200" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <rect x="240" y="55" width="24" height="24" rx="4" fill="#4A90D9"/>
    <!-- output nodes -->
    <rect x="80" y="200" width="24" height="24" rx="4" fill="#ccc"/>
    <rect x="140" y="200" width="24" height="24" rx="4" fill="#E8744F"/>
    <rect x="200" y="200" width="24" height="24" rx="4" fill="#ccc"/>
    <!-- connections (all to one, with varying weight) -->
    <g fill="none">
      <line x1="52" y1="79" x2="152" y2="200" stroke="#7ED321" stroke-width="1" opacity="0.3"/>
      <line x1="92" y1="79" x2="152" y2="200" stroke="#7ED321" stroke-width="1.5" opacity="0.5"/>
      <line x1="132" y1="79" x2="152" y2="200" stroke="#7ED321" stroke-width="3" opacity="1"/>
      <line x1="172" y1="79" x2="152" y2="200" stroke="#7ED321" stroke-width="2" opacity="0.7"/>
      <line x1="212" y1="79" x2="152" y2="200" stroke="#7ED321" stroke-width="1" opacity="0.2"/>
      <line x1="252" y1="79" x2="152" y2="200" stroke="#7ED321" stroke-width="2.5" opacity="0.8"/>
    </g>
    <text x="150" y="252" text-anchor="middle" font-size="11" fill="#888">거리 무관하게 관계 학습</text>
    <text x="150" y="268" text-anchor="middle" font-size="11" fill="#888">선 굵기 = attention 가중치</text>
  </g>

  <!-- Bottom labels (legend) -->
  <rect x="60" y="292" width="12" height="12" rx="2" fill="#4A90D9"/>
  <text x="78" y="303" font-size="11" fill="#666">입력 노드</text>
  <rect x="150" y="292" width="12" height="12" rx="2" fill="#E8744F"/>
  <text x="168" y="303" font-size="11" fill="#666">출력 노드</text>
</svg>
