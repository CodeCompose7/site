<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400" font-family="sans-serif">
  <text x="310" y="24" text-anchor="middle" font-size="16" font-weight="bold">QKV Attention Matrix (텍스트 번역 예시)</text>
  <text x="310" y="44" text-anchor="middle" font-size="12" fill="#666">8 입력 토큰 x 9 출력 토큰 = 72 관계</text>

  <!-- Column headers (output tokens) -->
  <g font-size="11" text-anchor="middle" fill="#4A90D9">
    <text x="175" y="76">Hello</text>
    <text x="225" y="76">,</text>
    <text x="275" y="76">the</text>
    <text x="325" y="76">weather</text>
    <text x="375" y="76">is</text>
    <text x="425" y="76">really</text>
    <text x="475" y="76">nice</text>
    <text x="525" y="76">today</text>
    <text x="575" y="76">.</text>
  </g>

  <!-- Row headers (input tokens) -->
  <g font-size="11" text-anchor="end" fill="#E8744F">
    <text x="148" y="106">안녕하세요</text>
    <text x="148" y="141">,</text>
    <text x="148" y="176">오늘</text>
    <text x="148" y="211">날씨</text>
    <text x="148" y="246">는</text>
    <text x="148" y="281">정말</text>
    <text x="148" y="316">좋습니다</text>
    <text x="148" y="351">.</text>
  </g>

  <!-- Grid -->
  <g stroke="#e0e0e0" stroke-width="0.5" fill="none">
    <!-- horizontal lines -->
    <line x1="155" y1="88" x2="600" y2="88"/>
    <line x1="155" y1="123" x2="600" y2="123"/>
    <line x1="155" y1="158" x2="600" y2="158"/>
    <line x1="155" y1="193" x2="600" y2="193"/>
    <line x1="155" y1="228" x2="600" y2="228"/>
    <line x1="155" y1="263" x2="600" y2="263"/>
    <line x1="155" y1="298" x2="600" y2="298"/>
    <line x1="155" y1="333" x2="600" y2="333"/>
    <line x1="155" y1="363" x2="600" y2="363"/>
    <!-- vertical lines -->
    <line x1="155" y1="60" x2="155" y2="363"/>
    <line x1="200" y1="60" x2="200" y2="363"/>
    <line x1="250" y1="60" x2="250" y2="363"/>
    <line x1="300" y1="60" x2="300" y2="363"/>
    <line x1="350" y1="60" x2="350" y2="363"/>
    <line x1="400" y1="60" x2="400" y2="363"/>
    <line x1="450" y1="60" x2="450" y2="363"/>
    <line x1="500" y1="60" x2="500" y2="363"/>
    <line x1="550" y1="60" x2="550" y2="363"/>
    <line x1="600" y1="60" x2="600" y2="363"/>
  </g>

  <!-- High attention cells (colored) -->
  <!-- 안녕하세요 → Hello (strong) -->
  <rect x="155" y="88" width="45" height="35" fill="#7ED321" opacity="0.7"/>
  <text x="177" y="110" text-anchor="middle" font-size="10" font-weight="bold">.82</text>

  <!-- , → , (strong) -->
  <rect x="200" y="123" width="50" height="35" fill="#7ED321" opacity="0.5"/>
  <text x="225" y="145" text-anchor="middle" font-size="10">.65</text>

  <!-- 오늘 → today (strong) -->
  <rect x="500" y="158" width="50" height="35" fill="#7ED321" opacity="0.7"/>
  <text x="525" y="180" text-anchor="middle" font-size="10" font-weight="bold">.78</text>

  <!-- 날씨 → weather (strong) -->
  <rect x="300" y="193" width="50" height="35" fill="#7ED321" opacity="0.8"/>
  <text x="325" y="215" text-anchor="middle" font-size="10" font-weight="bold">.85</text>

  <!-- 는 → is (medium) -->
  <rect x="350" y="228" width="50" height="35" fill="#F5A623" opacity="0.4"/>
  <text x="375" y="250" text-anchor="middle" font-size="10">.41</text>

  <!-- 정말 → really (strong) -->
  <rect x="400" y="263" width="50" height="35" fill="#7ED321" opacity="0.7"/>
  <text x="425" y="285" text-anchor="middle" font-size="10" font-weight="bold">.76</text>

  <!-- 좋습니다 → nice (strong) -->
  <rect x="450" y="298" width="50" height="35" fill="#7ED321" opacity="0.6"/>
  <text x="475" y="320" text-anchor="middle" font-size="10" font-weight="bold">.71</text>

  <!-- . → . (strong) -->
  <rect x="550" y="333" width="50" height="30" fill="#7ED321" opacity="0.5"/>
  <text x="575" y="352" text-anchor="middle" font-size="10">.63</text>

  <!-- Some weak cross-attention -->
  <!-- 날씨 → the (weak) -->
  <rect x="250" y="193" width="50" height="35" fill="#F5A623" opacity="0.2"/>
  <text x="275" y="215" text-anchor="middle" font-size="9" fill="#999">.12</text>

  <!-- 오늘 → the (weak) -->
  <rect x="250" y="158" width="50" height="35" fill="#F5A623" opacity="0.15"/>
  <text x="275" y="180" text-anchor="middle" font-size="9" fill="#999">.09</text>

  <!-- Legend -->
  <g transform="translate(155, 375)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="#7ED321" opacity="0.7"/>
    <text x="20" y="12" font-size="10" fill="#666">높은 attention</text>
    <rect x="120" y="0" width="14" height="14" rx="2" fill="#F5A623" opacity="0.3"/>
    <text x="140" y="12" font-size="10" fill="#666">낮은 attention</text>
    <text x="260" y="12" font-size="10" fill="#999">숫자 = attention weight (예시)</text>
  </g>
</svg>
