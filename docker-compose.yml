services:
  hugo:
    build: .
    ports:
      - "1313:1313"
    volumes:
      - .:/src
    environment:
      - TZ=Asia/Seoul
    # Hugo 서버만 실행 (슬라이드는 사전 빌드 필요)
    entrypoint: ["hugo"]
    command: ["server", "--bind", "0.0.0.0", "--baseURL", "http://localhost:1313/", "--disableFastRender"]

  tidy:
    build: .
    volumes:
      - .:/src
    entrypoint: ["hugo", "mod", "tidy"]
    profiles:
      - tools

  # 슬라이드 빌드 후 Hugo 서버 (처음 또는 슬라이드 변경 시)
  dev:
    build: .
    ports:
      - "1313:1313"
    volumes:
      - .:/src
    environment:
      - TZ=Asia/Seoul
    # entrypoint가 슬라이드 빌드 → Hugo 서버 순서로 실행
    profiles:
      - slides

  # 슬라이드만 빌드 (정적 파일 생성)
  slides-build:
    build: .
    volumes:
      - .:/src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for dir in /src/slides/*/; do
          if [ -f "$$dir/package.json" ]; then
            name=$$(basename "$$dir")
            echo "==> Building slides: $$name"
            cd "$$dir"
            npm install
            npx slidev build --base "/slides/$$name/" --out "/src/static/slides/$$name/"
            cp "/src/static/slides/$$name/index.html" "/src/static/slides/$$name/404.html"
            cd /src
          fi
        done
    profiles:
      - tools

  # 슬라이드 개발 서버 (핫 리로드, 새로고침 가능)
  slides-dev:
    build: .
    ports:
      - "3030:3030"
    volumes:
      - .:/src
    working_dir: /src/slides/lmm
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        npm install
        npx slidev --remote --port 3030
    profiles:
      - slides
