          { github = "https://github.com/CodeCompose7" },
          { email = "mailto:dev@codecompose.net" },
        ]
    [[languages.en.menu.main]]
      name = "Home"
      pageRef = "/"
      weight = 1
    [[languages.en.menu.main]]
      name = "Courses"
      pageRef = "courses"
      weight = 2
    [[languages.en.menu.main]]
      name = "Blog"
      pageRef = "blog"
      weight = 3
