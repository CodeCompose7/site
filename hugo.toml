# 프로덕션에서 사용할 기본 주소 (커스텀 도메인)
#   - GitHub Pages용 커스텀 도메인: https://courses.codecompose.net/
#   - 로컬 개발 시에는 hugo server --baseURL http://localhost:1313 옵션 사용
baseURL = "https://courses.codecompose.net/"
languageCode = "ko"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = true

title = "코드컴포즈"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[module]
  [[module.imports]]
    path = "github.com/CodeCompose7/cc-layouts"

[outputs]
  home = ["HTML", "RSS"]

[languages]
  [languages.ko]
    languageName = "한국어"
    weight = 1
    title = "코드컴포즈"
    copyright = "&copy; 2025 코드컴포즈"
    [languages.ko.params]
      description = "코드컴포즈 회사 소개"
      dateFormat = "2006년 1월 2일"
      nav_courses = "강의"
      nav_blog = "블로그"
      nav_tags = "태그"
      nav_about = "소개"
      footer_courses = "강의"
      footer_blog = "블로그"
      footer_about = "소개"
      footer_contact = "연락처"
      footer_company = "코드컴포즈"
      footer_business = "상호 코드컴포즈 · 대표자명 이태규 · 사업자등록번호 784-18-01999<br>통신판매업 신고번호 2023-인천연수구-0106<br>인천광역시 연수구 한나루로 133, 4층 433호(옥련동, 박프라자)"
      [languages.ko.params.author]
        name = "코드컴포즈"
        image = "img/profile.png"
        headline = "딥러닝, 프로그래밍,  \n개발 문화·워크플로 전반에 대한  \n강의와 테크 콘텐츠 제공"
        bio = "온라인·오프라인 강의, 딥러닝·쿠버네티스 개발/셋업, 모바일·웹 개발을 제공합니다."
        links = [
          { github = "https://github.com/CodeCompose7" },
          { email = "mailto:dev@codecompose.net" },
        ]
    [[languages.ko.menu.main]]
      name = "홈"
      pageRef = "/"
      weight = 1
    [[languages.ko.menu.main]]
      name = "강의"
      pageRef = "courses"
      weight = 2
    [[languages.ko.menu.main]]
      name = "블로그"
      pageRef = "blog"
      weight = 3
    [[languages.ko.menu.main]]
      name = "태그"
      url = "/ko/tags/"
      weight = 4
    [[languages.ko.menu.main]]
      name = "소개"
      url = "/ko/about/"
      weight = 5

  [languages.en]
    languageName = "English"
    weight = 2
    title = "CodeCompose"
    copyright = "&copy; 2025 CodeCompose"
    [languages.en.params]
