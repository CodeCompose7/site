name: Hugo 사이트를 Firebase에 배포

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Go 설정 (Hugo Modules용)
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: false

      - name: Hugo 설정
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Hugo Modules 정리
        run: |
          go env
          hugo mod tidy

      - name: 슬라이드 변경 확인
        id: slides-check
        run: |
          if [ -d "slides" ] && [ "$(ls -A slides/)" ]; then
            echo "has_slides=true" >> $GITHUB_OUTPUT
          else
            echo "has_slides=false" >> $GITHUB_OUTPUT
          fi

      - name: Node.js 설정
        if: steps.slides-check.outputs.has_slides == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Slidev npm 캐시
        if: steps.slides-check.outputs.has_slides == 'true'
        uses: actions/cache@v4
        with:
          path: slides/*/node_modules
          key: slidev-${{ runner.os }}-${{ hashFiles('slides/*/package.json') }}

      - name: Slidev 슬라이드 빌드
        if: steps.slides-check.outputs.has_slides == 'true'
        run: |
          for dir in slides/*/; do
            if [ -f "$dir/package.json" ]; then
              name=$(basename "$dir")
              echo "==> Building slides: $name"
              cd "$dir"
              npm install
              npx slidev build --base "/slides/$name/" --out "../../static/slides/$name/"
              cp "../../static/slides/$name/index.html" "../../static/slides/$name/404.html"
              cd ../..
            fi
          done

      - name: 슬라이드 인증 스크립트 삽입
        if: steps.slides-check.outputs.has_slides == 'true'
        run: node scripts/inject-slides-auth.js

      - name: Hugo로 빌드
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --minify

      - name: 빌드 결과 확인
        run: |
          echo "=== public/ 최상위 ==="
          ls -la ./public
          echo "=== slides 확인 ==="
          find ./public/slides -type f 2>/dev/null | head -10 || echo "slides 없음"
          echo "Build completed successfully"

      - name: Firebase 서비스 계정 키 설정
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > ${{ runner.temp }}/firebase-sa.json

      - name: Firebase에 배포 (Hosting)
        run: npx firebase-tools deploy --only hosting --project courses-web-6a6f8 --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
