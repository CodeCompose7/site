name: Hugo 사이트를 Pages에 배포

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Go 설정 (Hugo Modules용)
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: false

      - name: Hugo 설정
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Hugo Modules 정리
        run: |
          go env
          hugo mod tidy
          
      - name: 슬라이드 변경 확인
        id: slides-check
        run: |
          if [ -d "slides" ] && [ "$(ls -A slides/)" ]; then
            echo "has_slides=true" >> $GITHUB_OUTPUT
          else
            echo "has_slides=false" >> $GITHUB_OUTPUT
          fi

      - name: Node.js 설정 (Slidev 빌드용)
        if: steps.slides-check.outputs.has_slides == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Slidev npm 캐시
        if: steps.slides-check.outputs.has_slides == 'true'
        uses: actions/cache@v4
        with:
          path: slides/*/node_modules
          key: slidev-${{ runner.os }}-${{ hashFiles('slides/*/package.json') }}

      - name: Slidev 슬라이드 빌드
        if: steps.slides-check.outputs.has_slides == 'true'
        run: |
          for dir in slides/*/; do
            if [ -f "$dir/package.json" ]; then
              name=$(basename "$dir")
              echo "==> Building slides: $name"
              cd "$dir"
              npm install
              npx slidev build --base "/slides/$name/" --out "../../static/slides/$name/"
              cp "../../static/slides/$name/index.html" "../../static/slides/$name/404.html"
              cd ../..
            fi
          done

      - name: Pages 설정
        id: pages
        uses: actions/configure-pages@v3

      - name: Hugo로 빌드
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          # baseURL은 hugo.toml 에서 관리합니다.
          # (커스텀 도메인: https://courses.codecompose.net/)
          hugo --minify
        
      - name: 빌드 결과 확인
        run: |
          echo "=== public/ 최상위 ==="
          ls -la ./public
          echo "=== slides 확인 ==="
          find ./public/slides -type f 2>/dev/null | head -10 || echo "slides 없음"
          echo "=== lmm detail 확인 ==="
          find ./public -path "*/lmm/detail*" -type f 2>/dev/null | head -5 || echo "lmm detail 없음"
          echo "Build completed successfully"
          true
        
      - name: 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: GitHub Pages에 배포
        id: deployment
        uses: actions/deploy-pages@v4
