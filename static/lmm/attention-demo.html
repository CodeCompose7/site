<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attention Matrix - Interactive Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #333; padding: 20px; }
  h2 { font-size: 1.3rem; margin-bottom: 4px; text-align: center; }
  .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 16px; }
  .container { max-width: 700px; margin: 0 auto; }
  .matrix { display: grid; gap: 2px; margin: 0 auto; }
  .cell {
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; border-radius: 4px; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    min-height: 40px;
  }
  .cell:hover { transform: scale(1.1); box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 10; position: relative; }
  .cell.header-row { background: #e8744f; color: #fff; font-weight: 600; font-size: 0.8rem; cursor: default; }
  .cell.header-row:hover { transform: none; box-shadow: none; }
  .cell.header-col { background: #4a90d9; color: #fff; font-weight: 600; font-size: 0.8rem; cursor: default; }
  .cell.header-col:hover { transform: none; box-shadow: none; }
  .cell.corner { background: #f5f5f5; cursor: default; }
  .cell.corner:hover { transform: none; box-shadow: none; }
  .cell.data { border: 1px solid #e0e0e0; }
  .info-panel {
    margin-top: 16px; padding: 16px; background: #f8f9fa; border-radius: 8px;
    text-align: center; min-height: 60px; font-size: 0.95rem; line-height: 1.6;
    transition: background 0.2s;
  }
  .info-panel.active { background: #e8f5e9; }
  .legend { display: flex; justify-content: center; gap: 20px; margin-top: 12px; font-size: 0.8rem; color: #888; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 3px; }
</style>
</head>
<body>
<div class="container">
  <h2>QKV Attention Matrix</h2>
  <p class="subtitle">нХЬкµ≠мЦі вЖТ мШБмЦі л≤ИмЧ≠ мЛЬ нЖ†нБ∞ к∞Д attention к∞Ам§СмєШ (мЕАмЭД нБіл¶≠нХіл≥імДЄмЪФ)</p>
  <div class="matrix" id="matrix"></div>
  <div class="info-panel" id="info">мЕАмЭД нБіл¶≠нХШл©і нХілЛє нЖ†нБ∞ мМНмЭШ attention кіАк≥Дл•Љ л≥Љ мИШ мЮИмКµлЛИлЛ§.</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#4caf50"></div> лЖТмЭА attention</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fff9c4; border:1px solid #ddd"></div> лВЃмЭА attention</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#e8744f"></div> мЮЕл†• (нХЬкµ≠мЦі)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#4a90d9"></div> мґЬл†• (мШБмЦі)</div>
  </div>
</div>
<script>
const inputTokens = ['мХИлЕХнХШмДЄмЪФ', ',', 'мШ§лКШ', 'лВ†мФ®', 'лКФ', 'м†ХлІР', 'мҐЛмКµлЛИлЛ§', '.'];
const outputTokens = ['Hello', ',', 'the', 'weather', 'is', 'really', 'nice', 'today', '.'];

const weights = [
  [0.82, 0.05, 0.02, 0.01, 0.01, 0.03, 0.04, 0.01, 0.01],
  [0.03, 0.65, 0.02, 0.01, 0.01, 0.01, 0.01, 0.01, 0.25],
  [0.02, 0.01, 0.09, 0.05, 0.02, 0.01, 0.01, 0.78, 0.01],
  [0.01, 0.01, 0.12, 0.85, 0.00, 0.00, 0.00, 0.01, 0.00],
  [0.01, 0.01, 0.08, 0.03, 0.41, 0.02, 0.02, 0.02, 0.40],
  [0.02, 0.01, 0.01, 0.02, 0.02, 0.76, 0.14, 0.01, 0.01],
  [0.03, 0.01, 0.01, 0.03, 0.05, 0.10, 0.71, 0.02, 0.04],
  [0.01, 0.20, 0.01, 0.00, 0.01, 0.01, 0.02, 0.11, 0.63],
];

const explanations = {
  'мХИлЕХнХШмДЄмЪФ-Hello': '"мХИлЕХнХШмДЄмЪФ"лКФ мЭЄмВђлІРл°Ь, мШБмЦімЭШ "Hello"мЧР к∞АмЮ• к∞ХнХШк≤М мЧ∞к≤∞лР©лЛИлЛ§ (0.82)',
  'мШ§лКШ-today': '"мШ§лКШ"мЭА мЛЬк∞Д нСЬнШДмЬЉл°Ь, "today"мЧР к∞АмЮ• к∞ХнХШк≤М attentionмЭД м§НлЛИлЛ§ (0.78)',
  'лВ†мФ®-weather': '"лВ†мФ®"лКФ "weather"мЩА мІБм†С лМАмЭСлРШлКФ лЛ®мЦімЮЕлЛИлЛ§ (0.85) - к∞АмЮ• лЖТмЭА к∞Ам§СмєШ',
  'лКФ-is': '"лКФ"мЭА м£Љк≤© м°∞мВђл°Ь, "is"мЧР мЧ∞к≤∞лРШмІАлІМ лЛ§л•Є кµђм°∞мЦімЧРлПД лґДмВ∞лР©лЛИлЛ§ (0.41)',
  'м†ХлІР-really': '"м†ХлІР"мЭА к∞Хм°∞ лґАмВђл°Ь, "really"мЧР к∞ХнХШк≤М мЧ∞к≤∞лР©лЛИлЛ§ (0.76)',
  'мҐЛмКµлЛИлЛ§-nice': '"мҐЛмКµлЛИлЛ§"лКФ нШХмЪ©мВђл°Ь, "nice"мЧР мЧ∞к≤∞лР©лЛИлЛ§ (0.71). "really"мЧРлПД мЭЉлґА attention (0.10)',
  ',-,': 'мЙЉнСЬлКФ мЙЉнСЬмЧР мЧ∞к≤∞лР©лЛИлЛ§ (0.65)',
  '.-.': 'лІИмє®нСЬлКФ лІИмє®нСЬмЧР мЧ∞к≤∞лР©лЛИлЛ§ (0.63). мЙЉнСЬмЧРлПД мЭЉлґА (0.20)',
};

function getColor(w) {
  if (w > 0.6) return `rgba(76, 175, 80, ${0.3 + w * 0.7})`;
  if (w > 0.3) return `rgba(255, 193, 7, ${0.3 + w * 0.5})`;
  if (w > 0.1) return `rgba(255, 249, 196, ${0.5 + w})`;
  return `rgba(0, 0, 0, ${w * 0.15})`;
}

const grid = document.getElementById('matrix');
const cols = outputTokens.length + 1;
grid.style.gridTemplateColumns = `80px repeat(${outputTokens.length}, 1fr)`;

// Corner
grid.innerHTML = '<div class="cell corner"></div>';

// Column headers (output)
outputTokens.forEach(t => {
  grid.innerHTML += `<div class="cell header-col">${t}</div>`;
});

// Rows
inputTokens.forEach((inp, i) => {
  grid.innerHTML += `<div class="cell header-row">${inp}</div>`;
  outputTokens.forEach((out, j) => {
    const w = weights[i][j];
    grid.innerHTML += `<div class="cell data" style="background:${getColor(w)}" data-i="${i}" data-j="${j}" data-w="${w}">${w.toFixed(2)}</div>`;
  });
});

const info = document.getElementById('info');
grid.addEventListener('click', e => {
  const cell = e.target.closest('.cell.data');
  if (!cell) return;
  const i = +cell.dataset.i, j = +cell.dataset.j, w = +cell.dataset.w;
  const key = `${inputTokens[i]}-${outputTokens[j]}`;
  const expl = explanations[key];

  document.querySelectorAll('.cell.data').forEach(c => c.style.outline = 'none');
  // Highlight row and column
  document.querySelectorAll('.cell.data').forEach(c => {
    const ci = +c.dataset.i, cj = +c.dataset.j;
    if (ci === i || cj === j) c.style.outline = '2px solid #1976d2';
    if (ci === i && cj === j) c.style.outline = '3px solid #d32f2f';
  });

  info.className = 'info-panel active';
  info.innerHTML = expl
    ? `<strong>"${inputTokens[i]}" вЖТ "${outputTokens[j]}"</strong><br>${expl}`
    : `<strong>"${inputTokens[i]}" вЖТ "${outputTokens[j]}"</strong><br>Attention к∞Ам§СмєШ: ${w.toFixed(2)}`;
});
</script>
</body>
</html>
