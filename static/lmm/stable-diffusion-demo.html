<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stable Diffusion Pipeline Demo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#333;padding:20px}
  .container{max-width:750px;margin:0 auto;text-align:center}
  h2{font-size:1.2rem;margin-bottom:4px}
  .sub{color:#888;font-size:.85rem;margin-bottom:16px}
  canvas{display:block;margin:0 auto;border-radius:12px;border:1px solid #e8e8e8}
  .prompt-input{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
  .prompt-chip{padding:8px 16px;border-radius:20px;border:2px solid #e0e0e0;background:#fff;cursor:pointer;font-size:.85rem;transition:all .2s}
  .prompt-chip:hover{border-color:#e64a19;background:#fff3e0}
  .prompt-chip.active{border-color:#e64a19;background:#ffccbc;font-weight:600}
  .controls{display:flex;justify-content:center;gap:10px;margin-top:12px}
  .btn{padding:8px 20px;border-radius:20px;border:2px solid #e0e0e0;background:#fff;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
  .btn.primary{border-color:#1976d2;background:#1976d2;color:#fff}
  .info{margin-top:12px;padding:14px;background:#f8f9fa;border-radius:8px;font-size:.85rem;color:#555;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <h2>Stable Diffusion: 텍스트 → 이미지 파이프라인</h2>
  <p class="sub">프롬프트를 선택하고 "생성 시작"을 눌러 파이프라인의 각 단계를 확인하세요</p>
  <canvas id="canvas" width="700" height="360"></canvas>
  <div class="prompt-input">
    <div class="prompt-chip active" onclick="setPrompt(0)">🌸 벚꽃이 피는 봄날</div>
    <div class="prompt-chip" onclick="setPrompt(1)">🌊 파도치는 해변</div>
    <div class="prompt-chip" onclick="setPrompt(2)">🏔️ 눈 덮인 산</div>
    <div class="prompt-chip" onclick="setPrompt(3)">🌃 네온 도시 야경</div>
  </div>
  <div class="controls">
    <button class="btn primary" onclick="generate()">생성 시작</button>
  </div>
  <div class="info" id="info">프롬프트를 선택하고 "생성 시작"을 눌러보세요. Stable Diffusion의 VAE → CLIP → U-Net → VAE Decoder 파이프라인을 단계별로 보여줍니다.</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const dpr = window.devicePixelRatio || 1;
const W = 700, H = 360;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
canvas.width = W * dpr;
canvas.height = H * dpr;
const ctx = canvas.getContext('2d');
ctx.scale(dpr, dpr);
let currentPrompt = 0;
let step = 0, maxStep = 4, animT = 0, animId = null;

const prompts = [
  { text: '벚꽃이 피는 봄날', emoji: '🌸', colors: ['#fce4ec','#f48fb1','#e91e63','#c8e6c9','#81c784'] },
  { text: '파도치는 해변', emoji: '🌊', colors: ['#e3f2fd','#64b5f6','#1976d2','#fff9c4','#ffe082'] },
  { text: '눈 덮인 산', emoji: '🏔️', colors: ['#eceff1','#b0bec5','#546e7a','#e8eaf6','#ffffff'] },
  { text: '네온 도시 야경', emoji: '🌃', colors: ['#311b92','#e040fb','#00e5ff','#ffea00','#212121'] },
];

const stages = ['프롬프트 입력', 'CLIP 인코딩', 'U-Net Denoising', 'VAE 디코딩', '완성'];
const stageInfo = [
  '텍스트 프롬프트가 입력됩니다.',
  '<strong>CLIP Text Encoder</strong>가 텍스트를 768차원 벡터로 변환합니다. 이 벡터가 "어떤 이미지를 생성할지" 조건이 됩니다.',
  '<strong>U-Net</strong>이 랜덤 노이즈에서 시작하여 텍스트 조건(Cross-Attention)을 참고하며 반복적으로 denoising합니다. Latent Space(64x64)에서 동작합니다.',
  '<strong>VAE Decoder</strong>가 64x64 latent를 512x512 픽셀 이미지로 복원합니다.',
  '최종 이미지가 생성되었습니다! 전체 과정: 텍스트 → CLIP → U-Net(denoising x N) → VAE → 이미지',
];

function setPrompt(i) {
  currentPrompt = i;
  step = 0; animT = 0;
  document.querySelectorAll('.prompt-chip').forEach((c, j) => c.classList.toggle('active', j === i));
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  draw();
  document.getElementById('info').innerHTML = '프롬프트를 선택하고 "생성 시작"을 눌러보세요.';
}

function generate() {
  step = 0; animT = 0;
  if (animId) cancelAnimationFrame(animId);
  advanceStep();
}

function advanceStep() {
  document.getElementById('info').innerHTML = stageInfo[step];
  animT = 0;
  function tick() {
    animT += 0.015;
    draw();
    if (animT < 1.5) animId = requestAnimationFrame(tick);
    else if (step < maxStep) { step++; advanceStep(); }
  }
  tick();
}

function drawBox(x, y, w, h, label, fill, stroke, active) {
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 8);
  ctx.fillStyle = active ? fill : '#f5f5f5';
  ctx.fill();
  ctx.strokeStyle = active ? stroke : '#e0e0e0';
  ctx.lineWidth = active ? 2.5 : 1; ctx.stroke();
  ctx.fillStyle = active ? '#333' : '#bbb';
  ctx.font = `${active ? 'bold ' : ''}12px sans-serif`; ctx.textAlign = 'center';
  label.split('\n').forEach((l, i, arr) => ctx.fillText(l, x + w / 2, y + h / 2 + (i - (arr.length - 1) / 2) * 15));
}

function drawArrow(x1, y1, x2, y2, active) {
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = active ? '#1976d2' : '#e0e0e0'; ctx.lineWidth = active ? 2 : 1; ctx.stroke();
  if (active) {
    const a = Math.atan2(y2 - y1, x2 - x1);
    ctx.beginPath(); ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - 7 * Math.cos(a - 0.4), y2 - 7 * Math.sin(a - 0.4));
    ctx.lineTo(x2 - 7 * Math.cos(a + 0.4), y2 - 7 * Math.sin(a + 0.4));
    ctx.closePath(); ctx.fillStyle = '#1976d2'; ctx.fill();
  }
}

function drawNoise(x, y, w, h, amount) {
  // Use offscreen canvas so putImageData works with HiDPI scaling
  const pw = w * dpr, ph = h * dpr;
  const offscreen = document.createElement('canvas');
  offscreen.width = pw; offscreen.height = ph;
  const offCtx = offscreen.getContext('2d');
  const id = offCtx.createImageData(pw, ph);
  const p = prompts[currentPrompt];
  const cx = w / 2, cy = h / 2;
  const maxDist = Math.sqrt(cx * cx + cy * cy);
  for (let opy = 0; opy < ph; opy++) {
    for (let opx = 0; opx < pw; opx++) {
      const idx = (opy * pw + opx) * 4;
      // Map to logical coordinates for pattern generation
      const lx = opx / dpr, ly = opy / dpr;
      const dx = lx - cx, dy = ly - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx);
      // Use radial/angular pattern based on prompt colors for a 2D look
      const angleFrac = (angle + Math.PI) / (2 * Math.PI);
      const distFrac = dist / maxDist;
      // Blend multiple colors based on angle and distance
      const ci = angleFrac * (p.colors.length - 1);
      const ci0 = Math.floor(ci) % p.colors.length;
      const ci1 = (ci0 + 1) % p.colors.length;
      const blend = ci - Math.floor(ci);
      const col0 = hexToRgb(p.colors[ci0]);
      const col1 = hexToRgb(p.colors[ci1]);
      const col = [
        col0[0] * (1 - blend) + col1[0] * blend,
        col0[1] * (1 - blend) + col1[1] * blend,
        col0[2] * (1 - blend) + col1[2] * blend,
      ];
      // Darken towards edges for depth
      const edgeDarken = 1 - distFrac * 0.3;
      const noise = amount;
      id.data[idx] = (col[0] * edgeDarken) * (1 - noise) + Math.random() * 255 * noise;
      id.data[idx + 1] = (col[1] * edgeDarken) * (1 - noise) + Math.random() * 255 * noise;
      id.data[idx + 2] = (col[2] * edgeDarken) * (1 - noise) + Math.random() * 255 * noise;
      id.data[idx + 3] = 255;
    }
  }
  offCtx.putImageData(id, 0, 0);
  ctx.drawImage(offscreen, x, y, w, h);
  ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const cy = 170;

  // Prompt box
  drawBox(10, cy - 30, 100, 60, `"${prompts[currentPrompt].emoji}\n${prompts[currentPrompt].text}"`, '#ffccbc', '#e64a19', step >= 0);

  // CLIP
  drawBox(145, cy - 30, 90, 60, 'CLIP\nEncoder', '#b3e5fc', '#0288d1', step >= 1);
  drawArrow(110, cy, 145, cy, step >= 1);

  // U-Net
  drawBox(270, cy - 30, 90, 60, 'U-Net\nDenoising', '#fff9c4', '#f9a825', step >= 2);
  drawArrow(235, cy, 270, cy, step >= 2);
  // Cross-attention label
  if (step >= 2) {
    ctx.beginPath(); ctx.moveTo(190, cy - 30); ctx.quadraticCurveTo(230, cy - 70, 315, cy - 30);
    ctx.strokeStyle = '#0288d1'; ctx.lineWidth = 1.5; ctx.setLineDash([3, 2]); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#0288d1'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Cross-Attention', 252, cy - 55);
  }

  // VAE Decoder
  drawBox(395, cy - 30, 90, 60, 'VAE\nDecoder', '#e8eaf6', '#5c6bc0', step >= 3);
  drawArrow(360, cy, 395, cy, step >= 3);

  // Latent preview (small & noisy to show low-res latent)
  if (step >= 2) {
    const noiseAmt = step === 2 ? Math.max(0.15, 1 - animT) : 0.15;
    drawNoise(290, cy + 50, 50, 50, noiseAmt);
    ctx.fillStyle = '#888'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Latent 64x64', 315, cy + 112);
  }

  // Output image (larger & cleaner to show decoded high-res)
  if (step >= 3) {
    const noiseAmt = step === 3 ? Math.max(0, 0.3 - animT * 0.3) : 0;
    drawNoise(520, cy - 60, 160, 160, noiseAmt);
    ctx.fillStyle = '#888'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('512x512', 600, cy + 115);
    drawArrow(485, cy, 520, cy, true);
  }

  // Stage indicator
  ctx.fillStyle = '#1976d2'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`${stages[Math.min(step, 4)]}`, W / 2, 24);
}

draw();
</script>
</body>
</html>
