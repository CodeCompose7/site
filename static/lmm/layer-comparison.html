<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dense vs Convolution vs Self-Attention</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #333; }
  .container { max-width: 960px; margin: 0 auto; padding: 16px; }
  h2 { text-align: center; margin-bottom: 4px; font-size: 1.2rem; }
  .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 12px; }
  .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .tab {
    padding: 8px 20px; border-radius: 20px; border: 2px solid #e0e0e0; background: #fff;
    cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s;
  }
  .tab:hover { border-color: #90caf9; background: #e3f2fd; }
  .tab.active { border-color: #1976d2; background: #1976d2; color: #fff; }
  .view-toggle { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
  .view-btn { padding: 4px 14px; border-radius: 12px; border: 1px solid #ddd; background: #f5f5f5; cursor: pointer; font-size: 0.8rem; }
  .view-btn.active { background: #e3f2fd; border-color: #90caf9; }
  .canvas-area { display: flex; justify-content: center; }
  canvas { border-radius: 8px; border: 1px solid #e8e8e8; background: #fafafa; }
  .info { text-align: center; margin-top: 12px; font-size: 0.9rem; color: #555; min-height: 48px; line-height: 1.5; padding: 10px; background: #f8f9fa; border-radius: 8px; }
  .info strong { color: #1976d2; }
  .legend { display: flex; justify-content: center; gap: 16px; margin-top: 10px; font-size: 0.8rem; color: #888; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #ddd; }
</style>
</head>
<body>
<div class="container">
  <h2>Dense vs Convolution vs Self-Attention</h2>
  <p class="subtitle">레이어 타입을 선택하고, 입력 노드를 클릭해보세요</p>
  <div class="tabs">
    <div class="tab active" onclick="selectType('dense')">Dense (FC)</div>
    <div class="tab" onclick="selectType('conv')">Convolution</div>
    <div class="tab" onclick="selectType('attention')">Self-Attention</div>
  </div>
  <div class="view-toggle">
    <div class="view-btn active" data-view="1d" onclick="setView('1d')">1D</div>
    <div class="view-btn" data-view="2d" onclick="setView('2d')">2D Grid</div>
  </div>
  <div class="canvas-area">
    <canvas id="canvas" width="600" height="420"></canvas>
  </div>
  <div class="info" id="info">
    <strong>Dense:</strong> 모든 입력이 모든 출력에 연결됩니다. 입력 노드를 클릭해보세요.
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#bbdefb"></div> 입력</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ffccbc"></div> 출력</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#1976d2"></div> 선택된 입력</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#c8e6c9"></div> 연결된 출력</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
let currentType = 'dense';
let currentView = '1d';
let selectedNode = -1;
const R = 14;

function setupHiDPI(cvs) {
  const dpr = window.devicePixelRatio || 1;
  const rect = cvs.getBoundingClientRect();
  cvs.width = rect.width * dpr;
  cvs.height = rect.height * dpr;
  cvs.style.width = rect.width + 'px';
  cvs.style.height = rect.height + 'px';
  const c = cvs.getContext('2d');
  c.scale(dpr, dpr);
  return c;
}
const ctx = setupHiDPI(canvas);
// Logical dimensions for drawing
const W_LOGICAL = 600, H_LOGICAL = 420;

const infoTexts = {
  dense: '<strong>Dense (FC):</strong> 선택된 입력 노드가 <em>모든</em> 출력 노드에 동일한 가중치로 연결됩니다. 위치 관계를 학습할 수 없습니다.',
  conv: '<strong>Convolution:</strong> 선택된 입력 노드의 <em>주변</em>만 출력에 영향을 줍니다 (kernel=3). 멀리 있는 관계는 여러 레이어가 필요합니다.',
  attention: '<strong>Self-Attention:</strong> 선택된 입력 노드가 모든 출력에 연결되지만, <em>가중치가 다릅니다</em> (선 굵기). 어디에 집중할지 모델이 학습합니다.'
};

function selectType(type) {
  currentType = type;
  selectedNode = -1;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick="selectType('${type}')"]`).classList.add('active');
  document.getElementById('info').innerHTML = infoTexts[type];
  draw();
}

function setView(view) {
  currentView = view;
  selectedNode = -1;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.view-btn[data-view="${view}"]`).classList.add('active');
  const dpr = window.devicePixelRatio || 1;
  const logH = 420; // always use the taller height
  const logW = 600;
  canvas.style.width = logW + 'px';
  canvas.style.height = logH + 'px';
  canvas.width = logW * dpr;
  canvas.height = logH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const nodes = currentView === '1d' ? getNodes1D().inp : getNodes2D().inp;
  for (let i = 0; i < nodes.length; i++) {
    const dx = mx - nodes[i].x, dy = my - nodes[i].y;
    if (dx * dx + dy * dy < (R + 4) * (R + 4)) { selectedNode = i; draw(); return; }
  }
});

function getNodes1D() {
  const n = 8, m = 5;
  const inp = [], out = [];
  for (let i = 0; i < n; i++) inp.push({ x: 60 + i * 68, y: 60 });
  for (let i = 0; i < m; i++) out.push({ x: 110 + i * 100, y: 260 });
  return { inp, out };
}

function getNodes2D() {
  const rows = 5, cols = 5;
  const inp = [], out = [];
  const ox = 40, oy = 30, gap = 50;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) inp.push({ x: ox + c * gap, y: oy + r * gap, r, c });
  const ox2 = 340, oy2 = 30;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) out.push({ x: ox2 + c * gap, y: oy2 + r * gap, r, c });
  return { inp, out, rows, cols };
}

function getAttWeights(n) {
  const w = [];
  for (let i = 0; i < n; i++) w.push(0.05 + Math.random() * 0.3);
  if (selectedNode >= 0) w[selectedNode] = 0.9;
  if (selectedNode >= 0 && selectedNode + 1 < n) w[selectedNode + 1] = 0.6;
  return w;
}

function isConvNeighbor1D(sel, outIdx, nIn, nOut) {
  const center = Math.round(outIdx * (nIn - 1) / (nOut - 1));
  return Math.abs(sel - center) <= 1;
}

function isConvNeighbor2D(selR, selC, outR, outC) {
  return Math.abs(selR - outR) <= 1 && Math.abs(selC - outC) <= 1;
}

function draw() {
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  if (currentView === '1d') draw1D(); else draw2D();
}

function draw1D() {
  const { inp, out } = getNodes1D();
  const attW = getAttWeights(inp.length);

  // Draw connections
  if (selectedNode >= 0) {
    const si = selectedNode;
    out.forEach((o, j) => {
      let active = false, weight = 1;
      if (currentType === 'dense') { active = true; weight = 1; }
      else if (currentType === 'conv') { active = isConvNeighbor1D(si, j, inp.length, out.length); weight = active ? 1 : 0; }
      else { active = true; weight = attW[j % inp.length]; }

      if (active) {
        ctx.beginPath(); ctx.moveTo(inp[si].x, inp[si].y + R); ctx.lineTo(o.x, o.y - R);
        if (currentType === 'attention') {
          ctx.strokeStyle = `rgba(76,175,80,${0.3 + weight * 0.7})`;
          ctx.lineWidth = 1 + weight * 4;
        } else {
          ctx.strokeStyle = 'rgba(25,118,210,0.5)';
          ctx.lineWidth = 2;
        }
        ctx.stroke();
      }
    });
  }

  // Draw conv kernel bracket
  if (currentType === 'conv' && selectedNode >= 0) {
    const si = selectedNode;
    const start = Math.max(0, si - 1), end = Math.min(inp.length - 1, si + 1);
    ctx.setLineDash([5, 3]);
    ctx.strokeStyle = '#f57c00'; ctx.lineWidth = 2;
    ctx.strokeRect(inp[start].x - R - 4, inp[start].y - R - 4,
      inp[end].x - inp[start].x + R * 2 + 8, R * 2 + 8);
    ctx.setLineDash([]);
    ctx.fillStyle = '#f57c00'; ctx.font = '11px sans-serif';
    ctx.fillText('kernel (3)', inp[start].x, inp[start].y + R + 20);
  }

  // Draw nodes
  inp.forEach((n, i) => {
    ctx.beginPath(); ctx.arc(n.x, n.y, R, 0, Math.PI * 2);
    ctx.fillStyle = i === selectedNode ? '#1976d2' : '#bbdefb';
    ctx.fill();
    ctx.strokeStyle = i === selectedNode ? '#0d47a1' : '#64b5f6'; ctx.lineWidth = 2; ctx.stroke();
  });
  out.forEach((n, j) => {
    let connected = false;
    if (selectedNode >= 0) {
      if (currentType === 'dense') connected = true;
      else if (currentType === 'conv') connected = isConvNeighbor1D(selectedNode, j, inp.length, out.length);
      else connected = true;
    }
    ctx.beginPath(); ctx.arc(n.x, n.y, R, 0, Math.PI * 2);
    ctx.fillStyle = connected && selectedNode >= 0 ? '#c8e6c9' : '#ffccbc';
    ctx.fill();
    ctx.strokeStyle = connected && selectedNode >= 0 ? '#388e3c' : '#e64a19'; ctx.lineWidth = 2; ctx.stroke();
  });

  // Labels
  ctx.fillStyle = '#888'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('입력 (Input)', 10, 20);
  ctx.fillText('출력 (Output)', 10, 250);
}

function draw2D() {
  const { inp, out, rows, cols } = getNodes2D();
  const r = 10;

  // Draw connections
  if (selectedNode >= 0) {
    const si = inp[selectedNode];
    out.forEach((o, j) => {
      let active = false, weight = 1;
      const oj = out[j];
      if (currentType === 'dense') { active = true; weight = 0.3; }
      else if (currentType === 'conv') { active = isConvNeighbor2D(si.r, si.c, oj.r, oj.c); weight = active ? 1 : 0; }
      else {
        active = true;
        const dist = Math.abs(si.r - oj.r) + Math.abs(si.c - oj.c);
        weight = Math.max(0.05, 1 - dist * 0.15 + (Math.random() * 0.1));
      }
      if (active) {
        ctx.beginPath(); ctx.moveTo(si.x, si.y); ctx.lineTo(o.x, o.y);
        if (currentType === 'attention') {
          ctx.strokeStyle = `rgba(76,175,80,${0.1 + weight * 0.5})`;
          ctx.lineWidth = 0.5 + weight * 3;
        } else if (currentType === 'dense') {
          ctx.strokeStyle = 'rgba(25,118,210,0.08)';
          ctx.lineWidth = 0.5;
        } else {
          ctx.strokeStyle = 'rgba(245,124,0,0.5)';
          ctx.lineWidth = 2;
        }
        ctx.stroke();
      }
    });
  }

  // Conv kernel box in 2D
  if (currentType === 'conv' && selectedNode >= 0) {
    const si = inp[selectedNode];
    const gap = 50;
    ctx.setLineDash([4, 3]);
    ctx.strokeStyle = '#f57c00'; ctx.lineWidth = 2;
    ctx.strokeRect(si.x - gap - r - 2, si.y - gap - r - 2, gap * 2 + r * 2 + 4, gap * 2 + r * 2 + 4);
    ctx.setLineDash([]);
  }

  // Draw nodes
  const drawGrid = (nodes, isInput) => {
    nodes.forEach((n, i) => {
      ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      if (isInput) {
        ctx.fillStyle = i === selectedNode ? '#1976d2' : '#bbdefb';
        ctx.strokeStyle = i === selectedNode ? '#0d47a1' : '#90caf9';
      } else {
        let connected = false;
        if (selectedNode >= 0) {
          const si = inp[selectedNode];
          if (currentType === 'dense') connected = true;
          else if (currentType === 'conv') connected = isConvNeighbor2D(si.r, si.c, n.r, n.c);
          else connected = true;
        }
        ctx.fillStyle = connected && selectedNode >= 0 ? '#c8e6c9' : '#ffccbc';
        ctx.strokeStyle = connected && selectedNode >= 0 ? '#66bb6a' : '#ef9a9a';
      }
      ctx.fill(); ctx.lineWidth = 1.5; ctx.stroke();
    });
  };
  drawGrid(inp, true);
  drawGrid(out, false);

  // Labels
  ctx.fillStyle = '#888'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('입력 (5x5)', 140, rows * 50 + 50);
  ctx.fillText('출력 (5x5)', 440, rows * 50 + 50);
  ctx.fillStyle = '#bbb'; ctx.font = '20px sans-serif';
  ctx.fillText('→', 280, rows * 25 + 15);
}

draw();
</script>
</body>
</html>
